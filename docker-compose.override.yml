services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    volumes:
      - ./website:/app  
      - /app/.venv
    command: ["uv", "run", "fastapi", "dev", "server/main.py", "--host", "0.0.0.0", "--port", "8000"] 
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/mydatabase
    depends_on:
      - db

volumes:
  postgres_data: